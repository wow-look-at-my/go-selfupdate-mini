name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  build:
    name: Build and vet
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go_version: ['1.22']
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:

      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Go ${{ matrix.go_version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}
          check-latest: true
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...
